version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: kairos_user
      POSTGRES_PASSWORD: kairos_password_prod_secure
      POSTGRES_DB: kairos_db
    ports:
      - '5432:5432'
    volumes:
      - kairos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairos_user -d kairos_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://kairos_user:kairos_password_prod_secure@db:5432/kairos_db?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=https://seunovocarro.com.br,https://www.seunovocarro.com.br
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    depends_on:
      - api
    environment:
      - NODE_ENV=production
      # URL usada no browser. Se for o mesmo domínio do site + /api, defina também API_INTERNAL_URL.
      - NEXT_PUBLIC_API_URL=https://api.seunovocarro.com.br/api
      # Descomente se o front chamar /api no mesmo host do Next (rede Docker): repassa ao serviço `api`.
      # - API_INTERNAL_URL=http://api:3001
    ports:
      - "3000:3000"

volumes:
  kairos_pgdata:
